name: vaultly
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management.
  riverpod: ^3.2.1
  flutter_riverpod: ^3.2.1
  riverpod_annotation: ^4.0.2

  # Routing
  go_router: ^17.1.0

  # UI
  flutter_svg:
  google_fonts: ^6.2.1
  
  # Data Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # Backend
  supabase: ^2.10.4
  supabase_flutter: ^2.12.2

  # Utilities
  uuid: ^4.5.3

  # Serialization
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0

  # Animations & Effects
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.3
  build_runner: ^2.13.1
  freezed: ^3.0.0
  json_serializable: ^6.8.0

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/