name: vaultly
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management.
  riverpod: ^3.2.1

  # Routing
  go_router: ^17.1.0

  # UI
  flutter_svg:
  google_fonts: ^6.2.1
  
  # Data Storage
  shared_preferences: ^2.5.5
  flutter_secure_storage: ^10.0.0

  # Backend
  supabase: ^2.10.4
  supabase_flutter: ^2.12.2

  # Animations & Effects
  flutter_animate: ^4.5.2

  # Error tracking
  sentry_flutter: ^9.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/